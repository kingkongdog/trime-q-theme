__include: Q_26键无数字.trime:/ # 希望显示助记的主题名
__patch:
  name: Q_26键无数字_助记 # 现阶段同文以此项判断主题名

# 添加跳转助记键盘的预设键、返回键，返回键可选添加。不使用预设键，切换为此主题可直接使用助记功能。（也可使用切换指定主题的方式）
  # preset_keys/+: 
    # Keyboards_mrzj: {label: 助记, functional: false, send: Eisu_toggle, select: moran}
    # Keyboards_default: {label: 返回, send: Eisu_toggle, select: '.default'}

# 助记布局
preset_keyboards:
  default: # 主布局id或当前方案id，自行更改
    __include: Q_26键无数字.trime:/preset_keyboards/default
