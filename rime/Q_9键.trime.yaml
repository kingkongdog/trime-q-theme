      - {click: s, long_click: select_H, swipe_up: select_H, swipe_down: DelH, __include: Q_配色.yaml:/s}
      - {click: d, long_click: '|', swipe_up: '|', __include: Q_配色.yaml:/d}
      - {click: f, long_click: '\', swipe_up: '\', __include: Q_配色.yaml:/f}
      - {click: g, long_click: liquid_keyboard_emoji, swipe_up: liquid_keyboard_emoji, __include: Q_配色.yaml:/g}
      - {click: h, long_click: Keyboard_theme_editor, swipe_up: Keyboard_theme_editor, __include: Q_配色.yaml:/h}
      - {click: j, long_click: Clipboard_window, swipe_up: Clipboard_window, swipe_down: "\n", __include: Q_配色.yaml:/j}
      - {click: k, long_click: ':', swipe_up: ':', swipe_down: Symbol_switch, __include: Q_配色.yaml:/k}
      - {click: l, long_click: ';', swipe_up: ';', swipe_down: Hint_switch, __include: Q_配色.yaml:/l}
      - {width: 5}
# 第三行
      - {width: 15, click: Shift_L, long_click: Shift_L, double_click: Shift_L3, label_symbol: ' ', composing: Escape, swipe_up: Tab, key_text_size: 24, __include: Q_配色.yaml:/功能}
      - {click: z, long_click: '?', swipe_up: '?', __include: Q_配色.yaml:/z}
      - {click: x, long_click: cut, swipe_up: cut, __include: Q_配色.yaml:/x}
      - {click: c, long_click: copy, swipe_up: copy, __include: Q_配色.yaml:/c}
      - {click: v, long_click: paste_clip, swipe_up: paste_clip, __include: Q_配色.yaml:/v}
      - {click: b, long_click: '"', swipe_up: '"', swipe_down: Color_settings, __include: Q_配色.yaml:/b}
      - {click: n, long_click: "'", swipe_up: "'", swipe_down: Theme_settings, __include: Q_配色.yaml:/n}
      - {click: m, long_click: '/', swipe_up: '/', swipe_down: Menu, __include: Q_配色.yaml:/m}
      - {width: 15, click: BackSpace2, swipe_up: Clear, label_symbol: "清空", swipe_left: Escape, swipe_down: Delete, key_text_size: 21, __include: Q_配色.yaml:/退格}
# 第四行
      - {width: 16, click: Keyboard_number2, long_click: liquid_keyboard_en, label_symbol: ' ', key_text_size: 18, __include: Q_配色.yaml:/数字}
      - {width: 42, click: space, long_click: VOICE_ASSIST, swipe_left: Left, swipe_right: Right, key_text_size: 17, __include: Q_配色.yaml:/空格}
      - {width: 13, click: '.', label: ' 。', label_symbol: "\uE102", long_click: Theme_settings, swipe_up: ',', key_text_size: *标点字号, __include: Q_配色.yaml:/逗号}
      - {width: 13, click: Keyboard_default2, label: "\uE075", label_symbol: "\uE134", long_click: Color_settings, swipe_up: '!', key_text_size: 30, key_text_offset_y: -4, __include: Q_配色.yaml:/句号}
      - {width: 16, click: Return, label: enter_labels, long_click: Menu, label_symbol: "\uE144", key_text_size: 17, __include: Q_配色.yaml:/回车}

# 数字键盘
  number:
    __include: /preset_keyboards/default
    lock: false
    ascii_mode: 1
    width: 22
    keys:
      - {width: 100, height: *九键顶行高}
# 第一行
      - {width: 17, click: '+', long_click: '-', swipe_down: '*', hint: '*', key_text_size: *标点字号, __include: Q_配色.yaml:/数字符1}
      - {click: '1', __include: Q_配色.yaml:/1}
      - {click: '2', __include: Q_配色.yaml:/2}
      - {click: '3', __include: Q_配色.yaml:/3}
      - {width: 17, click: BackSpace2, key_text_size: 21, __include: Q_配色.yaml:/数字退格}
# 第二行
      - {width: 17, click: '%', long_click: '/', swipe_down: '@', hint: '@', key_text_size: 17, __include: Q_配色.yaml:/数字符2}
      - {click: '4', __include: Q_配色.yaml:/4}
      - {click: '5', __include: Q_配色.yaml:/5}
      - {click: '6', __include: Q_配色.yaml:/6}
      - {width: 17, click: '#', key_text_size: *标点字号, __include: Q_配色.yaml:/数字空格}
# 第三行
      - {width: 17, click: '=', long_click: '(){Left}', key_text_size: *标点字号, __include: Q_配色.yaml:/数字符3}
      - {click: '7', __include: Q_配色.yaml:/7}
      - {click: '8', __include: Q_配色.yaml:/8}
      - {click: '9', __include: Q_配色.yaml:/9}
      - {width: 17, click: Keyboard_editor, key_text_size: 21, __include: Q_配色.yaml:/数字编辑}
# 第四行
      - {width: 17, click: Keyboard_lock, key_text_size: 17, __include: Q_配色.yaml:/数字返回}
      - {click: space2, long_click: VOICE_ASSIST, swipe_left: Left, swipe_right: Right, key_text_size: 22, __include: Q_配色.yaml:/数字逗号}
      - {click: '0', __include: Q_配色.yaml:/0}
      - {click: '.', long_click: ',', key_text_size: *标点字号, __include: Q_配色.yaml:/数字句号}
      - {width: 17, click: Return, key_text_size: 17, __include: Q_配色.yaml:/数字回车}

# 编辑键盘
  editor:
    __include: /preset_keyboards/number
    keys:
      - {width: 100, height: *九键顶行高}
# 第一行
      - {width: 17, click: select_all, key_text_size: *标点字号, __include: Q_配色.yaml:/功能风}
      - {click: Clear, key_text_size: 17, __include: Q_配色.yaml:/功能风}
      - {click: liquid_keyboard_en, key_text_size: 17, __include: Q_配色.yaml:/功能风}
      - {click: liquid_keyboard_cn, key_text_size: 17, __include: Q_配色.yaml:/功能风}
      - {width: 17, click: Keyboard_default, key_text_size: 17, __include: Q_配色.yaml:/功能风}
# 第二行
      - {width: 17, click: cut, key_text_size: 19, __include: Q_配色.yaml:/功能风}
      - {click: undo, key_text_size: 17}
      - {click: Up}
      - {click: redo, key_text_size: 17}
      - {width: 17, click: BackSpace2, key_text_size: 21, __include: Q_配色.yaml:/退格}
# 第三行
      - {width: 17, click: copy, key_text_size: *标点字号, __include: Q_配色.yaml:/功能风}
      - {click: Left}
      - {click: Shift_L2, key_text_size: 17, __include: Q_配色.yaml:/功能}
      - {click: Right}
      - {width: 17, click: Keyboard_theme_editor, key_text_size: *标点字号, __include: Q_配色.yaml:/功能风}
# 第四行
      - {width: 17, click: paste_clip, key_text_size: 18, __include: Q_配色.yaml:/功能风}
      - {click: Home, key_text_size: 17}
      - {click: Down}
      - {click: End, key_text_size: 17}
      - {width: 17, click: Keyboard_number2, key_text_size: 17, __include: Q_配色.yaml:/功能风}
# 第五行
      - {width: 17, click: Keyboard_lock, key_text_size: 17, __include: Q_配色.yaml:/数字}
      - {click: Tab, key_text_size: 17, __include: Q_配色.yaml:/功能风}
      - {click: space2, key_text_size: 22, __include: Q_配色.yaml:/功能风}
      - {click: RepeatCommit, key_text_size: 17, __include: Q_配色.yaml:/功能风}
      - {width: 17, click: Return, key_text_size: 17, __include: Q_配色.yaml:/回车}

# 主题编辑键盘
  theme_editor:
    __include: /preset_keyboards/default
    lock: false
    ascii_mode: 1
    width: 10
    height: *英文行高
    vertical_gap: *英文行距
    horizontal_gap: *英文列距
    keys:
# 第一行
      - {click: 键盘背景, long_click: ', round_corner: ', label_symbol: 圆角, key_text_size: 14}
      - {click: 键宽, long_click: ', vertical_gap: ', label_symbol: 行距, key_text_size: 14}
      - {click: 键高, long_click: 'horizontal_gap: ', label_symbol: 列距, key_text_size: 14}
      - {click: 键值, long_click: ', long_click: ', label_symbol: 长按, swipe_down: ', double_click: ', hint: 双击, key_text_size: 14}
      - {click: 显示, long_click: ', label_symbol: ', label_symbol: 上显, swipe_down: ', hint: ', hint: 下显, key_text_size: 14}
      - {click: 按键背景, long_click: ', hilited_key_back_color: ', label_symbol: 键高亮, swipe_down: ', popup: []{Left}', hint: 气泡, key_text_size: 14}
      - {click: 字色, long_click: ', key_symbol_color: ', label_symbol: 符字色, swipe_down: ', lazy_double_click: ', hint: 缓双击, key_text_size: 14}
      - {click: 字高亮, long_click: ', hilited_key_symbol_color: ', label_symbol: 符高亮, swipe_down: ', preview: ', hint: 预览, key_text_size: 14}
      - {click: 字号, long_click: ', symbol_text_size: ', label_symbol: 符字号, swipe_down: ', repeatable: ', hint: 复按, key_text_size: 14}
      - {click: 按下x, long_click: ', key_press_offset_y: ', label_symbol: 按下y, swipe_down: ', states: ', hint: 状态, key_text_size: 14}
# 第二行
      - {click: 字x, long_click: ', key_text_offset_y: ', label_symbol: 字y, key_text_size: 14}
      - {click: 上符x, long_click: ', key_symbol_offset_y: ', label_symbol: 上符y, key_text_size: 14}
      - {click: 下符x, long_click: ', key_hint_offset_y: ', label_symbol: 下符y, key_text_size: 14}
      - {click: 上划, long_click: 'Up {BackSpace}', label_symbol: 上, key_text_size: 14}
      - {click: 下划, long_click: 'Down {BackSpace}', label_symbol: 下, key_text_size: 14}
      - {click: 左划, long_click: 'Left {BackSpace}', label_symbol: 左, swipe_down: ', commit: ', hint: 上屏, key_text_size: 14}
      - {click: 右划, long_click: 'Right {BackSpace}', label_symbol: 右, swipe_down: ', paging: ', hint: 翻页时, key_text_size: 14}
      - {click: Up, key_text_size: 17, __include: Q_配色.yaml:/功能风}
      - {click: Home, long_click: ', has_menu: ', label_symbol: 候选, swipe_down: ', send_bindings: ', hint: 发绑, key_text_size: 14}
      - {click: End, long_click: ', composing: ', label_symbol: 编码, swipe_down: 'true', hint: 'true', key_text_size: 14}
# 第三行
      - {click: undo, key_text_size: 14}
      - {click: redo, key_text_size: 14}
      - {click: select_all, key_text_size: 14}
      - {click: cut, key_text_size: 14}
      - {click: copy, key_text_size: 14}
      - {click: paste_clip, key_text_size: 14}
      - {click: Left, key_text_size: 17, __include: Q_配色.yaml:/功能风}
      - {click: Down, key_text_size: 17, __include: Q_配色.yaml:/功能风}
      - {click: Right, key_text_size: 17, __include: Q_配色.yaml:/功能风}
      - {click: RepeatCommit, long_click: 'false', label_symbol: 'false', swipe_down: ', ascii: ', hint: 英键值, key_text_size: 14}
# 第四行
      - {width: 15, click: Keyboard_lock, key_text_size: 17, __include: Q_配色.yaml:/数字}
      - {width: 15, click: Shift_L2, key_text_size: 17, __include: Q_配色.yaml:/功能}
      - {width: 40, click: space, swipe_left: Left, swipe_right: Right, key_text_size: 17, __include: Q_配色.yaml:/空格}
      - {width: 15, click: BackSpace2, swipe_up: Escape, swipe_left: Escape, swipe_right: Delete, swipe_down: Delete, key_text_size: 17, __include: Q_配色.yaml:/退格}
      - {width: 15, click: Return, key_text_size: 17, __include: Q_配色.yaml:/回车}

# 流式键盘
liquid_keyboard:
  # 目前只能直接写参数，不支持变量或者fallback机制。
  # 缺少参数时，自动从style中加载参数。除非需要指定liquid_keyboard使用与主键盘不同的背景色、背景图，否则不应设置被注释掉的参数。
  author: 'tumuyan'
  row: 5              #每屏最多显示多少行按键
  row_land: 5         #横屏每屏最多显示多少行按键
  key_height: 60      #按键高度
  key_height_land: 60 #横屏模式按键高度
  single_width: 57    #single类型的按键宽度
  vertical_gap: 0     #纵向按键间隙
  margin_x: 0       #左右按键间隙
  fixed_key_bar:     # 固定按键条
    position: right   # 摆放位置（在滚动区域的……） top|bottom|left|right
    keys:  # 按键（显示名称为对应的label，不能放太多）
      - liquid_keyboard_exit
      - BackSpace
      - space3
      - Return2
  keyboards: [emoji, history, ascii, cn, math, list, ids, symbol, tabs, pinyin, script_symbols, jp, grease, rusa, korea, lation, yinbiao, unit, yanwenzi, combing, candidate, emoji2]  #tab列表
  # tabs:
    # name: 更多
    # type: TABS
  candidate:
    name: 候选
    type: CANDIDATE
  history:
    name: 常用
    type: HISTORY
  emoji:
    name: emoji
    type: SINGLE
    keys: "😂😀😃😄😁😆😅🤣🙂🙃🫠😉😊😇🥰😍🤩😘😗☺😚😙🥲😋😛😜🤪😝🤑🤗🤭🫢🫣🤫🤔🫡🤐🤨😐😑😶🫥😏😒🙄😬🤥😌😔😪🤤😴😷🤒🤕🤢🤮🤧🥵🥶🥴😵🤯🤠🥳🥸😎🤓🧐😕🫤😟🙁☹😮😯😲😳🥺🥹😦😧😨😰😥😢😭😱😖😣😞😓😩😫🥱😤😡😠🤬"
  emoji2:
