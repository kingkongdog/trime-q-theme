# Trime default style settings
# encoding: utf-8

config_version: '3.0'
name: Q_9键
author: Q_name

快捷配置锚点:

# 数字（九宫）键盘：
#键盘整体高度可调节下方总高度
  ⚪: &九键顶行高 2
  ⚪: &九键行高 63
  ⚪: &九键末行高 72

# 全局  键距/圆角：
  ⚪: &行距 0
  ⚪: &列距 2
  ⚪: &圆角 12

# 英文键盘：
#键盘整体高度可调节下方总高度
  ⚪: &英文行高 62.5
  ⚪: &英文行距 0 #若为0，则跟随全局数值
  ⚪: &英文列距 0 #若为0，则跟随全局数值

# 字符 X/Y 轴偏移：左移上移负数-，右移下移正数
  ⚪: &上符x 0
  ⚪: &上符y 5
  ⚪: &字y -2
  ⚪: &下符y -3.5
  ⚪: &按下偏移y 2

# 字号
  ⚪: &标点字号 20

# 风格样式：
style:
# 竖屏键盘
  keyboard_height: 260 #总高度
  keyboard_padding: 2 #两侧边距
  keyboard_padding_bottom: 10 #底部边距
  # keyboard_padding_left: 0 #左手左侧边距
  # keyboard_padding_right: 0 #右手右侧边距
# 横屏键盘
  keyboard_height_land: 220 #总高度
  keyboard_padding_land: 60 #两侧边距
  keyboard_padding_land_bottom: 0 #底部边距

# 字型/字号
  latin_font: [iconfont.ttf, Y.ttf] #latin.ttf #西文字型
  text_font: [Y.ttf] #latin.ttf #编码字型
  comment_font: [Y.ttf] #comment.ttf #提示字型
  candidate_font: han.ttf #候选字型
  key_font: [iconfont.ttf, Y.ttf] #symbol.ttf #按键字型
  popup_font: [iconfont.ttf, Y.ttf] #latin.ttf #按键气泡字型
  label_font: [Y.ttf] #label.ttf #悬浮窗序号字型
  symbol_font: [iconfont.ttf, Y.ttf] #symbol.ttf #上下符字型
  hanb_font: han.ttf #扩充字型
  comment_text_size: 12 #提示字号
  candidate_text_size: 21 #候选字号
  key_text_size: 24 #按键字号
  popup_text_size: 22 #按键气泡字号
  key_long_text_size: 17 #长文本按键字号
  symbol_text_size: 11 #上下符字号

# 状态栏
  comment_height: 26 #提示区高度
  candidate_view_height: 26 #候选区高度
  candidate_padding: 10 #候选项内边距
  candidate_spacing: 1 #候选分割线宽度（候选间距随宽度变化）
  comment_on_top: true #状态栏提示在上方true或右侧false（候选窗会下移）

# 语言/键盘
  # background_folder: #背景图保存在background目录下的哪个子目录
  auto_caps: false #自动句首大写:true|false|ascii
  reset_ascii_mode: true #不同进程中显示键盘时重置为中文状态（true:重置为中文；false:记忆中英状态）
  key_border: 1 #按键边框宽度
  key_width: 10.0 #键宽，占屏幕宽的百分比
  key_height: 55 #键高
  vertical_gap: *行距 #按键行距
  horizontal_gap: *列距 #按键列距
  round_corner: *圆角 #按鍵圓角半徑
  vertical_correction: -5 #按键实际纵向偏移 负为向下
  shadow_radius: 0.0 #按键文字阴影半径
  popup_width: 33 #按键气泡宽度
  popup_height: 50 #按键气泡高度
  popup_bottom_margin: 65 #按键气泡底部边距（较原始按键上移距离）
  popup_key_height: 50 #{__include: /style/popup_height} #按键气泡内键（容器）高度；跟随按键气泡高度，也可为数值（建议值：按键气泡高度+2）
  proximity_correction: true #按键纠错
  enter_label_mode: 3 #是否使用App提供的ActionLabel内容作为Enter键的文本（由于多数App没有适配ActionLable，实际影响不大）。0不使用，1只使用actionlabel，2优先使用，3当其他方式没有获得label时才读取actionlabel
  enter_labels: #定义Enter键的文本
    go: 前往
    done: 完成
    next: 下个
    pre:  上个
    search: 搜索
    send: 发送
    default: 回车 #定义默认Enter键的文本

# 悬浮窗
window:
  insets: #窗口内边距
    vertical: 3 #纵向内边距（整数）
    horizontal: 3 #横向内边距（整数）
  item_padding: #候选项内边距
    vertical: 2 #纵向内边距（整数）
    horizontal: 4 #横向内边距（整数）
  min_width: 5 #最小宽度（整数）
  corner_radius: 10 #圆角半径（浮点）
  alpha: 1 #透明度（0-1，浮点）
  foreground: #前景样式
    label_font_size: 21 #序号字号（浮点）
    text_font_size: 21 #候选字号（浮点）
    comment_font_size: 18 #提示字号（浮点）

# 预编辑（状态栏编码区）文本视图参数
preedit:
  horizontal_padding: 11 #横向内边距（整数）
  alpha: 1 #不透明度（0-1，浮点）
  top_end_radius: 10 #右上方圆角（浮点）
  foreground: #前景样式
    font_size: 20 #字号（浮点）


# 后备配色
fallback_colors:
  __include: Q_配色.yaml:/fallback_colors

# 配色方案
preset_color_schemes:
  __include: Q_配色.yaml:/preset_color_schemes


android_keys:
  # 仅供编辑键盘时参考，实际不产生任何效果
  when:
    ascii: 西文標籤
    paging: 翻頁標籤
    has_menu: 選單標籤
    composing: 輸入狀態標籤
    #always: 始終
    #hover: 划過
    combo: 並擊
    click: 單按
    long_click: 長按
    #double_click: 雙按
    swipe_left: 左划
    swipe_right: 右划
    swipe_up: 上划
    swipe_down: 下划
  property:
    width: 寬度
    height: 高度
    gap: 間隔
    preview: 預覽
    hint: 提示
    label: 標籤
    states: 狀態標籤
    repeatable: 連續按鍵
    functional: 功能鍵
    shift_lock: Shift鎖定 #ascii_long: 英文長按中文單按鎖定, long: 長按鎖定, click: 單按鎖定
  action:
    command: 命令
    option: 參數
    select: 選擇
    toggle: 狀態
    send: 按鍵
    text: 文字
    commit: 上屏

preset_keys:
  # 安卓
  BRIGHTNESS_DOWN: {label: 亮度-, send: BRIGHTNESS_DOWN}
  BRIGHTNESS_UP: {label: 亮度+, send: BRIGHTNESS_UP}
  CALCULATOR: {label: 計算機, send: CALCULATOR}
  CALENDAR: {label: 日曆, send: CALENDAR}
  CONTACTS: {label: 電話簿, send: CONTACTS}
  ENVELOPE: {label: 信箱, send: ENVELOPE}
  EXPLORER: {label: 瀏覽器, send: EXPLORER}
  MUSIC: {label: 音樂, send: MUSIC}
  POWER: {label: 電源, send: POWER}
  SEARCH: {label: 搜尋, send: Find}
  SLEEP: {label: 休眠, send: SLEEP}
  VOICE_ASSIST: {label: "\uE180", send: VOICE_ASSIST}
  VOLUME_DOWN: {label: 音量-, send: VOLUME_DOWN}
  VOLUME_UP: {label: 音量+, send: VOLUME_UP}
  VOLUME_MUTE: {label: 靜音, send: VOLUME_MUTE}

  # rime狀態
  Mode_switch: {toggle: ascii_mode, send: Mode_switch, states: [ 中文, English ]}
  Zenkaku_Hankaku: {toggle: full_shape, send: Mode_switch, states: [ 半角, 全角 ]}
  Henkan: {toggle: simplification, send: Mode_switch, states: [ 漢字, 汉字 ]}
  Charset_switch: {toggle: extended_charset, send: Mode_switch, states: [ 常用, 增廣 ]}
  Punct_switch: {toggle: ascii_punct, send: Mode_switch, states: [ 。，, ．， ]}

  # rime組合鍵
  F4: {label: 方案選單, send: F4}
  BackToPreviousSyllable: {label: 刪音節, send: Control+BackSpace}
  CommitRawInput: {label: 編碼, send: Control+Return}
  CommitScriptText: {label: 編碼, send: Shift+Return}
  CommitComment: {label: "\uE1BE", send: Control+Shift+Return}
  DeleteCandidate: {label: 刪詞, send: Control+Delete}

  # trime命令
  Date: {label: 日期, command: date, option: "yyyy-MM-dd"}
  ChineseDate: {label: 農曆, command: date, option: "zh_CN@calendar=chinese"} #農曆等日期（>=Android 7.0）：date 語言@calendar=曆法 格式。具體參見https://developer.android.com/reference/android/icu/util/Calendar.html
  Time: {label: 時間, command: date, option: "HH:mm:ss"} #時間： date 格式
  TrimeApp: {label: 同文, command: run, option: "com.osfans.trime"} #運行程序: run 包名
  TrimeCmp: {label: 同文組件, command: run, option: "com.osfans.trime/.ui.main.PrefMainActivity"} #運行程序指定組件: run 包名/組件名
  Homepage: {label: 同文主頁, command: run, option: "https://github.com/osfans/trime"} #查看網頁: run 網址
  CommitHomepage: {label: 同文網址, commit: "https://github.com/osfans/trime"} #直接上屏
  Wiki: {label: 維基, command: run, option: "https://zh.wikipedia.org/wiki/%s"} #搜索網頁: %s或者%1$s爲當前字符
  Google: {label: 谷歌, command: run, option: "https://www.google.com/search?q=%s"} #搜索網頁: %s或者%1$s爲當前字符
  MoeDict: {label: 萌典, command: run, option: "https://www.moedict.tw/%3$s"} #搜索網頁: %3$s爲光標前字符
  Baidu: {label: 百度搜索, command: run, option: "https://www.baidu.com/s?wd=%4$s"} #搜索網頁: %4s爲光標前所有字符
  Zdic: {label: 漢典, command: run, option: "https://www.zdic.net/hans/%1$s"} #搜索網頁: %s或者%1$s爲當前字符
  Zdic2: {label: 漢典, command: run, option: "http://www.zdic.net/sousuo/?q=%2$s"} #搜索網頁: %2$s爲當前輸入的編碼
  WebSearch: {label: 搜索網頁, command: web_search, option: "%4$s"} #搜索，其他view、dial、edit、search等intent，參考安卓的intent文檔：https://developer.android.com/reference/android/content/Intent.html
  Search: {label: 搜索, command: search, option: "%1$s"} #搜索短信、字典等
  Share: {label: 分享, command: send, option: "%s"} #分享指定文本: %s或者%1$s爲當前字符
  Deploy: {label: 部署, command: broadcast, option: "com.osfans.trime.action.DEPLOY"}
  Sync: {label: 同步, command: broadcast, option: "com.osfans.trime.action.SYNC_USER_DATA"}
  RepeatCommit: { label: 重复, command: commit, option: "%1$s" } #重复输入刚上屏的内容

  # trime設定
  IME_switch: { label: 🌐, send: LANGUAGE_SWITCH } #彈出對話框選擇輸入法
  IME_last: { label: 上一輸入法, send: LANGUAGE_SWITCH, select: .last } #直接切換到上一輸入法
  IME_next: { label: 下一輸入法, send: LANGUAGE_SWITCH, select: .next } #直接切換到下一輸入法
  Schema_switch: {label: 下一方案, send: Control+Shift+1}
  one_hand_switch_1: {toggle: _one_hand_mode_1, send: Mode_switch, states: [ 左手, 普通 ]}
  one_hand_switch_2: {toggle: _one_hand_mode_2, send: Mode_switch, states: [ 右手, 普通 ]}
  one_hand_switch_3: {toggle: _one_hand_mode_3, send: Mode_switch, states: [ 左手, 右手 ]}
  Color_switch: {label: 配色, send: PROG_RED}
  Help: {label: 說明, send: Help}
  Info: {label: 關於, send: INFO}
  Menu: {label: 方案, send: Menu}
  Settings: {label: ⚙, send: SETTINGS}
  Color_settings: {label: 配色, send: SETTINGS, option: "color"}
  Theme_settings: {label: 主题, send: SETTINGS, option: "theme"}
  Schema_settings: {label: 方案, send: SETTINGS, option: "schema"}
  Candidate_switch: {toggle: _hide_candidate, send: Mode_switch, states: [ 有候選, 無候選]}
  Comment_switch: {toggle: _hide_comment, send: Mode_switch, states: [ 有註釋, 無註釋]}
  Symbol_switch: {toggle: _hide_key_symbol, send: Mode_switch, states: [ ≡, ️□]} #上符隐藏，lable显示定义无法去除
  Hint_switch: {toggle: _hide_key_hint, send: Mode_switch, states: [ 有助記, 無助記]}

  # 編輯
  Escape: {label: Esc, send: Escape}
  Home: {label: 行首, send: Home}
  Insert: {label: Ins, send: Insert}
  Delete: {label: 刪除, send: Delete}
  End: {label: 行尾, send: End}
  Page_Up: {label: 上頁, send: Page_Up}
  Page_Down: {label: 下頁, send: Page_Down}
  Left: {label: '←', repeatable: true, send: Left}
  Down: {label: '↓', repeatable: true, send: Down}
  Up: {label: '↑', repeatable: true, send: Up}
  Right: {label: '→', repeatable: true, send: Right}
  select_all: {label: ☑, send: Control+a}
  Clear: {label: 清除, text: "{Control+a}{BackSpace}"} #全選並刪除
  cut: {label: ✁, send: Control+x}
  cut_all: {label: 全挪, text: "{Control+a}{Control+x}"} #全選並剪切
  copy: {label: ❐, send: Control+c}
  copy_all: {label: 全謄, text: "{Control+a}{Control+c}"} #全選並複製
  paste: {label: 貼上, send: Control+v}
  paste_text: {label: 貼上文本, send: Control+Shift+Alt+v} #>=Android 6.0
  paste_clip: {label: ▣, send: function, command: clipboard}
  paste_clip_enter: {text: "{clipboard}{Return}"}
  share_text: {label: 分享文本, send: Control+Alt+s} #>=Android 6.0
  undo: {label: 撤销, repeatable: true, send: Control+z} #>=Android 6.0
  redo: {label: 重做, repeatable: true, send: Control+Shift+z} #>=Android 6.0
  Key_tab: {label: Tab, preview: '↹', repeatable: false, text: '	'}
  select_H: {label: ☑↔, text: '{End}{Shift+Home}'}  #选择行
  DelH: {label: ☒↔, text: '{End}{Shift+Home}{Delete}'}  #删除行
  键盘背景: {label: 盘背, commit: 'keyboard_back_color: '}
  按下x: {label: 按下x, commit: ', key_press_offset_x: '}
  按键背景: {label: 键背, commit: ', key_back_color: '}
  背景高亮: {label: 背高, commit: ', hilited_key_back_color: '}
  字高亮: {label: 字高, commit: ', hilited_key_text_color: '}
  字色: {label: 字色, commit: ', key_text_color: '}
  字号: {label: 字号, commit: ', key_text_size: '}
  显示: {label: 显示, commit: ', label: '}
  键宽: {label: 键宽, commit: ', width: '}
  键高: {label: 键高, commit: 'height: '}
  键值: {label: 键值, commit: 'click: '}
  字x: {label: 字x, commit: ', key_text_offset_x: '}
  上符x: {label: 上符x, commit: ', key_symbol_offset_x: '}
  下符x: {label: 下符x, commit: ', key_hint_offset_x: '}
  上划: {label: 上划, commit: ', swipe_up: '}
  下划: {label: 下划, commit: ', swipe_down: '}
  左划: {label: 左划, commit: ', swipe_left: '}
  右划: {label: 右划, commit: ', swipe_right: '}

  # 键盘切换、主键
  Hide: {label: 收起, send: BACK}
  Shift_L: {label: "\uE1B6", functional: true, send: Shift_L, shift_lock: long} #long中英状态长按锁定｜ascii_long英文長按中文單按鎖定｜click單按鎖定
  Shift_L2: {label: 选择, functional: true, send: Shift_L, shift_lock: long}
  Shift_L3: {functional: true, send: Shift_L, shift_lock: click} #供双击使用，仅shift_lock: click支持双击
  BackSpace: {label: 退格, repeatable: true, send: BackSpace}
  # BackSpace: {label: 退格, repeatable: true, slide_delete: true, send: BackSpace} #逐字删除/恢复文本
  BackSpace2: {label: "\uE040", repeatable: true, send: BackSpace}
  Keyboard_letter: {label: "\uE074", send: Eisu_toggle, select: letter}
  Keyboard_number: {label: 数字, send: Eisu_toggle, select: number}
  Keyboard_number2: {label: 123, send: Eisu_toggle, select: number}
  Keyboard_lock: {label: 返回, send: Eisu_toggle, select: .last_lock} #返回上一个锁定的键盘，主题内有多个主键盘时，非主键盘勿开启lock。
  Keyboard_default: {label: 返回, send: Eisu_toggle, select: .default}
  Keyboard_default2: {label: "\uE075", send: Eisu_toggle, select: .default}
  Keyboard_landscape: {label: 竖, send: Eisu_toggle, select: landscape}
  space: {slide_cursor: true, send: space}
  space2: {label: ⎵, slide_cursor: true, send: space}
  space3: {label: 空格, send: space}
  Return: {label: enter_labels, send: Return}
  Return2: {label: 回车, send: Return}
  Keyboard_switch: {label: 鍵盤, send: Eisu_toggle, select: .next}
  set_color_ink: { label: 切换到ink配色, send: function, command: set_color_scheme, option: ink}
  set_theme: { label: 🔴, send: function, command: set_theme, option: "" } #切换到指定主题，空参数为刷新主题
  Keyboard_editor: {label: "\uE1C1", send: Eisu_toggle, select: editor}
  Keyboard_theme_editor: {label: ✎, send: Eisu_toggle, select: theme_editor}
  liquid_keyboard_switch: {label: 更多, send: function, command: liquid_keyboard, option: 更多}
  liquid_keyboard_exit: {label: 返回, send: function, command: liquid_keyboard, option: "-1"} #退出liquidkeyboard
  liquid_keyboard_emoji: {label: ☻, send: function, command: liquid_keyboard, option: emoji}
  Clipboard_window: {label: ⏍, send: function, command: clipboard_window}
  liquid_keyboard_cn: {label: 中文, send: function, command: liquid_keyboard, option: 中文}
  liquid_keyboard_en: {label: 英文, send: function, command: liquid_keyboard, option: 英文}
  menu_keyboard: {label: 菜单, send: function, command: menu_keyboard}

