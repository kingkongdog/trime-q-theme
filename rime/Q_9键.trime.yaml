  commit_t: {label: "t", commit: "t"}
  commit_u: {label: "u", commit: "u"}
  commit_v: {label: "v", commit: "v"}
  commit_w: {label: "w", commit: "w"}
  commit_x: {label: "x", commit: "x"}
  commit_y: {label: "y", commit: "y"}
  commit_z: {label: "z", commit: "z"}

  # 数字 0 - 9
  commit_0_focused: {label: "0", commit: "0"}
  commit_1_focused: {label: "1", commit: "1"}
  commit_2_focused: {label: "2", commit: "2"}
  commit_3_focused: {label: "3", commit: "3"}
  commit_4_focused: {label: "4", commit: "4"}
  commit_5_focused: {label: "5", commit: "5"}
  commit_6_focused: {label: "6", commit: "6"}
  commit_7_focused: {label: "7", commit: "7"}
  commit_8_focused: {label: "8", commit: "8"}
  commit_9_focused: {label: "9", commit: "9"}

  # @
  commit_@: {commit: "@"}

  # space composing 0
  space_composing_0: {label: 中文之韵, send: 0}

  # ,
  commit_comma: {commit: ","}

  # .
  commit_period: {commit: "."}

  # :
  commit_colon: {commit: ':'}

# 状态栏工具
tool_bar:
  button_spacing: 0 #按钮间距
  button_font: iconfont.ttf #按钮字体，内置质感设计图标样式（ic@+名称或\u+U码）

  #🔴左侧固定主按钮：
  primary_button:
    # 背景配置：
    background:
      bg_normal: 0x00       #背景
      bg_highlight: 非首选      #背景高亮
      type: rectangle      #背景高亮形状 (圆形circle | 矩形rectangle)
      corner_radius: 8      #圆角半径
      vertical_inset: 4      #垂直方向内缩量
      horizontal_inset: 0      #水平方向内缩量
    #前景配置：
    foreground:
      style: "\uE141"      #前景样式（图片或字符），可为空，使用默认样式，按钮将显示为 action 的 label；也可为列表（option_styles），将根据 action 的 toggle 决定
      fg_normal: 非首选      #字色
      fg_highlight: 首选（高亮标注项）      #字高亮
      font_size: 24      #字号
      padding: 14      #与背景边界的上下内边距，适用于字符形式前景
      # size: [53, 55]      #视图控件宽高，非字符宽高，适用于图片形式前景
    action: menu_keyboard      #按钮点击事件

  #🔴隐藏键盘：
  hide_button: &hide_button
    background:
      bg_highlight: {__include: /tool_bar/primary_button/background/bg_highlight} #跟随主按钮背景高亮
      type: {__include: /tool_bar/primary_button/background/type} #跟随主按钮背景高亮形状
      corner_radius: {__include: /tool_bar/primary_button/background/corner_radius} #跟随主按钮背景圆角
    foreground:
      style: "ic@keyboard_close"
      fg_highlight: {__include: /tool_bar/primary_button/foreground/fg_highlight} #跟随主按钮字高亮
      font_size: 20
    action: Hide

  #🔴语音输入：
  voice_button: &voice_button
    background:
      bg_highlight: {__include: /tool_bar/primary_button/background/bg_highlight} #跟随主按钮背景高亮
      type: {__include: /tool_bar/primary_button/background/type} #跟随主按钮背景高亮形状
      corner_radius: {__include: /tool_bar/primary_button/background/corner_radius} #跟随主按钮背景圆角
    foreground:
      style: "\uE180"
      fg_highlight: {__include: /tool_bar/primary_button/foreground/fg_highlight} #跟随主按钮字高亮
      font_size: 25
      padding: 13
    action: VOICE_ASSIST

  #🔴表情：
  emoji_button: &emoji_button
    background:
      bg_highlight: {__include: /tool_bar/primary_button/background/bg_highlight}
      type: {__include: /tool_bar/primary_button/background/type}
      corner_radius: {__include: /tool_bar/primary_button/background/corner_radius}
    foreground:
      style: "ic@emoticon"
      fg_highlight: {__include: /tool_bar/primary_button/foreground/fg_highlight}
      font_size: 20
    action: liquid_keyboard_emoji

  #🔴剪贴板：
  clipboard_button: &clipboard_button
    background:
      bg_highlight: {__include: /tool_bar/primary_button/background/bg_highlight}
      type: {__include: /tool_bar/primary_button/background/type}
      corner_radius: {__include: /tool_bar/primary_button/background/corner_radius}
    foreground:
      style: "\uE09C"
      fg_highlight: {__include: /tool_bar/primary_button/foreground/fg_highlight}
      font_size: 25
      padding: 13
    action: Clipboard_window

  #🔴编辑：
  edit_button: &edit_button
    background:
      bg_highlight: {__include: /tool_bar/primary_button/background/bg_highlight}
      type: {__include: /tool_bar/primary_button/background/type}
      corner_radius: {__include: /tool_bar/primary_button/background/corner_radius}
    foreground:
      style: "\uE1C1"
      fg_highlight: {__include: /tool_bar/primary_button/foreground/fg_highlight}
      font_size: 25
      padding: 13      #与背景边界的内边距
    action: Keyboard_editor

  #🔴重做：
  redo_button: &redo_button
    background:
      bg_highlight: {__include: /tool_bar/primary_button/background/bg_highlight}
      type: {__include: /tool_bar/primary_button/background/type}
      corner_radius: {__include: /tool_bar/primary_button/background/corner_radius}
    foreground:
      style: "ic@redo"
      fg_highlight: {__include: /tool_bar/primary_button/foreground/fg_highlight}
      font_size: 21
    action: redo

  #🔴撤销：
  undo_button: &undo_button
    background:
      bg_highlight: {__include: /tool_bar/primary_button/background/bg_highlight}
      type: {__include: /tool_bar/primary_button/background/type}
      corner_radius: {__include: /tool_bar/primary_button/background/corner_radius}
    foreground:
      style: "ic@undo"
      fg_highlight: {__include: /tool_bar/primary_button/foreground/fg_highlight}
      font_size: 21
    action: undo

  # 右侧按钮列表（从右向左排列）
  buttons:
    - *hide_button
    - *voice_button
    - *emoji_button
    - *clipboard_button
    - *edit_button
    - *redo_button
    - *undo_button


preset_keyboards:
# 主键盘
  default:
    lock: false
    ascii_mode: 0
    reset_ascii_mode: true
    label_transform: none # 中文时字母大写显示：uppercase 小写：none
    ascii_keyboard: letter #指定英文模式键盘
    width: 21
    height: *九键行高
    key_symbol_offset_x: *上符x
    key_symbol_offset_y: *上符y
    key_text_offset_y: *字y
    key_hint_offset_y: *下符y
    key_press_offset_y: *按下偏移y
    # columns: 8 #列数，超出则换行
    # auto_height_index: -1 #吸收缩放后的余数，数值为该键盘行号，1（首行）至≥最大行号（末行），负数则倒数。
    keys:
      - {width: 100, height: *九键顶行高}
# 第一行
      - {width: 21, click: ',', label: '️ ，️', long_click: commit_comma, swipe_up: "\"\"{Left}", label_symbol: '“”', swipe_down: "\\", hint: '、', key_text_size: *标点字号, __include: Q_配色.yaml:/数字符1}
      - {click: 1, label: "'⤴︎⬆︎", label_symbol: "1", swipe_up: "'", swipe_down: select_all, hint: '全选', __include: Q_配色.yaml:/1, key_text_size: 20, popup: [commit_1_focused]}
      - {click: 2, label: ABC, label_symbol: "2", swipe_down: copy, hint: '复制', __include: Q_配色.yaml:/2, swipe_left: 'a', swipe_up: 'b', swipe_right: 'c', key_text_size: 20, popup: [commit_A, commit_B, commit_C, commit_2_focused, commit_a, commit_b, commit_c]}
      - {click: 3, label: DEF, label_symbol: "3", swipe_down: paste_clip, hint: '粘贴', __include: Q_配色.yaml:/3, swipe_left: 'd', swipe_up: 'e', swipe_right: 'f', key_text_size: 20, popup: [commit_D, commit_E, commit_F, commit_d, commit_e, commit_f, commit_3_focused]}
      - {width: 16, click: BackSpace2, swipe_left: Escape, swipe_down: DelH, hint: '删除行', swipe_up: select_H, label_symbol: "\uE0A3", key_text_size: 21, __include: Q_配色.yaml:/数字退格}
# 第二行
      - {width: 21, click: '.', label: '️ 。', long_click: commit_period, swipe_up: '<>{Left}', label_symbol: '《》', swipe_down: '^', hint: '……', key_text_size: *标点字号, __include: Q_配色.yaml:/数字符2}
      - {click: 4, label: GHI, label_symbol: "4", swipe_down: cut, hint: '剪切', __include: Q_配色.yaml:/4, swipe_left: 'g', swipe_up: 'h', swipe_right: 'i', key_text_size: 20, popup: [commit_4_focused, commit_G, commit_H, commit_I, commit_g, commit_h, commit_i]}
      - {click: 5, label: JKL, label_symbol: "5", swipe_down: Clear, hint: '清空', __include: Q_配色.yaml:/5, swipe_left: 'j', swipe_up: 'k', swipe_right: 'l', key_text_size: 20, popup: [commit_J, commit_K, commit_L, commit_5_focused, commit_j, commit_k, commit_l]}
      - {click: 6, label: MNO, label_symbol: "6", swipe_down: paste_clip_enter, hint: "粘贴↩", __include: Q_配色.yaml:/6, swipe_left: 'm', swipe_up: 'n', swipe_right: 'o', key_text_size: 20, popup: [commit_M, commit_N, commit_O, commit_m, commit_n, commit_o, commit_6_focused]}
      - {width: 16, click: 0, label: 0, long_click: commit_colon, swipe_up: ':', label_symbol: '：', swipe_down: ';', hint: '；', key_text_size: *标点字号, __include: Q_配色.yaml:/数字空格}
# 第三行
      - {width: 21, click: '?', label: ' ？', swipe_up: '(){Left}', label_symbol: '（）', swipe_down: '/', hint: '/', key_text_size: *标点字号, __include: Q_配色.yaml:/数字符3}
      - {click: 7, label: PQRS, label_symbol: "7", __include: Q_配色.yaml:/7, swipe_left: 'p', swipe_up: 'q', swipe_right: 'r', swipe_down: 's', key_text_size: 20, popup: [commit_7_focused, commit_P, commit_Q, commit_R, commit_S, commit_p, commit_q, commit_r, commit_s]}
      - {click: 8, label: TUV, label_symbol: "8", swipe_down: Delete, hint: 'Del', __include: Q_配色.yaml:/8, swipe_left: 't', swipe_up: 'u', swipe_right: 'v', key_text_size: 20, popup: [commit_T, commit_U, commit_V, commit_8_focused, commit_t, commit_u, commit_v]}
      - {click: 9, label: WXYZ, label_symbol: "9", __include: Q_配色.yaml:/9, swipe_left: 'w', swipe_up: 'x', swipe_right: 'y', swipe_down: 'z', key_text_size: 20, popup: [commit_W, commit_X, commit_Y, commit_Z, commit_w, commit_x, commit_y, commit_z, commit_9_focused]}
      - {width: 16, click: Shift_L2, long_click: Shift_L2, label: '️Shift', swipe_up: "@", label_symbol: '@', swipe_down: "\n", hint: "\uE031", swipe_left: Escape, composing: Escape, key_text_size: *标点字号, __include: Q_配色.yaml:/数字编辑}
# 第四行
      - {width: 21, click: '!', label: '️!', long_click: Theme_settings, hint: "\uE102", swipe_up: "%", label_symbol: "%", key_text_size: 18, __include: Q_配色.yaml:/数字返回, key_hint_offset_y: -5}
      - {width: 14, click: liquid_keyboard_en, label: 符, swipe_up: Home, label_symbol: "\uE0A5", swipe_left: set_theme, long_click: Color_settings, hint: "\uE134", key_text_size: 17, __include: Q_配色.yaml:/数字逗号, key_hint_offset_y: -5}
      - {width: 35, click: space, label: 中文之韵, long_click: VOICE_ASSIST, popup: [commit_0_focused], label_symbol: '0', swipe_left: Left, swipe_right: Right, swipe_up: Up, swipe_down: Down, __include: Q_配色.yaml:/空格, composing: space_composing_0}
      - {width: 14, click: Keyboard_letter, label: "\uE074", long_click: Keyboard_landscape, swipe_up: End, label_symbol: "\uE0B5", key_text_size: 30, key_text_offset_y: -4, __include: Q_配色.yaml:/数字句号}
      - {width: 16, click: Return, long_click: Menu, label_symbol: " ", hint: "\uE144", key_text_size: 17, __include: Q_配色.yaml:/数字回车, key_hint_offset_y: -5}

